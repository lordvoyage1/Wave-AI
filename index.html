<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/orb.png" />
    <link rel="apple-touch-icon" href="/orb.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wave AI" />
    <meta name="theme-color" content="#060c1a" />
    <title>Wave AI — Advanced Intelligence</title>
    <meta name="description" content="Wave AI — the most capable AI assistant. Chat, code, create images, generate videos, synthesize voice, analyze files. Built by Wave Platforms, Inc." />
    <meta name="keywords" content="Wave AI, AI assistant, artificial intelligence, Wave Platforms, image generation, video generation, code AI, East Africa" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wave AI — Advanced Intelligence" />
    <meta property="og:description" content="One platform. Every AI capability. Chat, code, images, video, voice, vision — all in one conversation." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wave AI" />
    <meta name="twitter:description" content="Advanced AI assistant by Wave Platforms, Inc." />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Preconnect to AI APIs for zero-latency first request -->
    <link rel="preconnect" href="https://api.princetechn.com" />
    <link rel="preconnect" href="https://apis.xcasper.space" />
    <link rel="preconnect" href="https://apiskeith.top" />
    <link rel="dns-prefetch" href="https://api.princetechn.com" />
    <link rel="dns-prefetch" href="https://apis.xcasper.space" />
    <link rel="dns-prefetch" href="https://apiskeith.top" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <!-- Prevent flash of wrong styles: use app's light bg immediately -->
    <style>
      html, body { margin: 0; padding: 0; font-family: Inter, system-ui, sans-serif; background: #f8f9fc; }
      #root { min-height: 100dvh; background: #f8f9fc; }
      * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

      #wave-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; background: #f8f9fc; z-index: 99999;
        transition: opacity 0.35s ease;
      }
      #wave-boot.fade { opacity: 0; pointer-events: none; }
      #wave-boot .orb {
        width: 64px; height: 64px; border-radius: 50%;
        background-image: url('/orb.png');
        background-size: cover; background-position: center;
        box-shadow: 0 0 24px rgba(79,127,255,0.32), 0 8px 22px rgba(0,0,0,0.12);
        animation: bootFloat 3s ease-in-out infinite;
      }
      #wave-boot .ring {
        position: absolute; width: 92px; height: 92px; border-radius: 50%;
        border: 1.5px solid rgba(155,92,255,0.28);
        animation: bootPulse 2.4s ease-in-out infinite;
      }
      #wave-boot .dots { display: flex; gap: 6px; margin-top: 4px; }
      #wave-boot .dots span {
        width: 7px; height: 7px; border-radius: 50%;
        background: linear-gradient(135deg,#4f7fff,#9b5cff);
        animation: bootDot 1.2s ease-in-out infinite;
      }
      #wave-boot .dots span:nth-child(2) { animation-delay: 0.18s; }
      #wave-boot .dots span:nth-child(3) { animation-delay: 0.36s; }
      #wave-boot .label {
        font-size: 12px; color: #94a3b8; letter-spacing: 0.04em;
        font-weight: 500;
      }
      @keyframes bootFloat {
        0%,100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-6px) scale(1.04); }
      }
      @keyframes bootPulse {
        0%,100% { transform: scale(0.92); opacity: 0.55; }
        50% { transform: scale(1.08); opacity: 0; }
      }
      @keyframes bootDot {
        0%,100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-4px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="wave-boot" aria-hidden="true">
      <div style="position:relative;display:flex;align-items:center;justify-content:center;">
        <div class="ring"></div>
        <div class="orb"></div>
      </div>
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="label">Loading Wave AI</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // PWA service worker — production only.
      // In dev, SW caches break Vite HMR and serve stale bundles.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        var h = location.hostname;
        var isDev =
          h === 'localhost' ||
          h === '127.0.0.1' ||
          h.endsWith('.replit.dev') ||
          h.endsWith('.repl.co') ||
          h.endsWith('.spock.replit.dev') ||
          h.endsWith('.kirk.replit.dev') ||
          h.endsWith('.picard.replit.dev');
        if (isDev) {
          navigator.serviceWorker.getRegistrations()
            .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
            .catch(function () {});
          if (window.caches) {
            caches.keys()
              .then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
        } else {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
          });
        }
      })();
    </script>
  </body>
</html>
